<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes"/>
  <title>Для Алинки 🦊🥑🐱</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ИНДИКАТОР ГЛАВ с лапками -->
<div class="chapter-indicator">
  <div class="chapter-dot" data-chapter="1">🐾</div>
  <div class="chapter-dot" data-chapter="2">🐾</div>
  <div class="chapter-dot" data-chapter="3">🐾</div>
</div>

<!-- БОКОВЫЕ СТРАНИЦЫ КНИГИ -->
<div class="book-side-pages"></div>

<!-- ОБЛОЖКА -->
<section class="hero" id="heroSection">
  <div class="book-container" id="openBook">
    <div class="book">
      <div class="cover">
        <div class="paw-prints"></div>
        <h1 id="heroTitle"></h1>
        <p id="heroText"></p>
        <button>📖 Открыть книгу 🦊</button>
      </div>
    </div>
  </div>
</section>

<!-- ОСНОВНОЙ КОНТЕНТ -->
<main id="content" style="display: none;"></main>

<!-- НАВИГАЦИЯ -->
<div class="book-navigation">
  <button id="prevPage">← Назад</button>
  <button id="nextPage">Вперёд →</button>
</div>

<script src="texts.js"></script>
<script src="script.js"></script>
</body>
</html>
